
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#1a4f7a;--brand-light:#e8f2fa;--brand-mid:#2d7ab5;
  --accent:#e8640a;--accent-light:#fff3eb;
  --surface:var(--color-background-primary);
  --surface2:var(--color-background-secondary);
  --border:var(--color-border-tertiary);
  --text:var(--color-text-primary);
  --muted:var(--color-text-secondary);
  --success:#2a7d4f;--success-bg:#eaf5ef;
  --danger:#c0392b;--danger-bg:#fdecea;
}
.wrap{font-family:'DM Sans',sans-serif;max-width:680px;margin:0 auto;padding:12px 0 24px}
.header{background:var(--brand);color:#fff;border-radius:16px 16px 0 0;padding:18px 20px 14px;display:flex;align-items:center;gap:12px}
.logo-circle{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header-text h1{font-size:17px;font-weight:600;letter-spacing:-0.02em}
.header-text p{font-size:12px;opacity:0.8;margin-top:2px}
.badge-after{background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.06em;margin-left:8px;vertical-align:2px}
.status-bar{background:#0f3352;color:rgba(255,255,255,0.7);font-size:11px;padding:6px 20px;display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.chat-window{background:var(--surface2);border-left:0.5px solid var(--border);border-right:0.5px solid var(--border);padding:16px;min-height:120px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:420px}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.bot{justify-content:flex-start}
.msg.user{justify-content:flex-end}
.msg.bot .bubble{background:var(--surface);border:0.5px solid var(--border);border-radius:16px 16px 16px 4px;color:var(--text);max-width:82%}
.msg.user .bubble{background:var(--brand);color:#fff;border-radius:16px 16px 4px 16px;max-width:82%}
.bubble{padding:10px 14px;font-size:14px;line-height:1.55}
.bubble p+p{margin-top:6px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:600}
.typing{display:flex;align-items:center;gap:4px;padding:10px 14px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:dot 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,60%,100%{opacity:0.3;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}
.quick-section{padding:10px 16px 12px;background:var(--surface2);border-left:0.5px solid var(--border);border-right:0.5px solid var(--border)}
.quick-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:6px}
.qbtn{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:9px 11px;font-size:12.5px;font-family:'DM Sans',sans-serif;color:var(--text);cursor:pointer;text-align:left;transition:all 0.15s;display:flex;align-items:center;gap:7px;line-height:1.35}
.qbtn i{font-size:16px;color:var(--brand-mid);flex-shrink:0}
.qbtn:hover{background:var(--brand-light);border-color:var(--brand-mid);color:var(--brand)}
.qbtn.urgent i{color:var(--accent)}
.qbtn.urgent:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.emergency-strip{background:var(--surface);border-left:0.5px solid var(--border);border-right:0.5px solid var(--border);padding:0 16px 10px}
.emergency-bar{background:var(--danger-bg);border:0.5px solid #f5c6c2;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--danger);cursor:pointer}
.emergency-bar i{font-size:18px;flex-shrink:0}
.emergency-bar strong{font-weight:600}
.input-row{display:flex;gap:8px;padding:12px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:0 0 16px 16px;align-items:center}
#chat-input{flex:1;border:0.5px solid var(--border);border-radius:10px;padding:9px 13px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text);outline:none;transition:border-color 0.15s}
#chat-input:focus{border-color:var(--brand-mid)}
#send-btn{background:var(--brand);color:#fff;border:none;border-radius:10px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background 0.15s}
#send-btn:hover{background:var(--brand-mid)}
.info-chip{display:inline-flex;align-items:center;gap:5px;background:var(--brand-light);color:var(--brand);font-size:12px;padding:3px 9px;border-radius:20px;margin:2px 2px 0 0}
.info-chip i{font-size:13px}
.chip-row{margin-top:8px}
.confirm-card{background:var(--success-bg);border:0.5px solid #a8d8bc;border-radius:10px;padding:10px 13px;font-size:13px;color:var(--success);margin-top:6px}
.confirm-card strong{font-weight:600;display:block;margin-bottom:3px}
.narration{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:6px;padding:0 2px;line-height:1.5}
</style>

<div class="wrap">
  <div class="header">
    <div class="logo-circle">🔧</div>
    <div class="header-text">
      <h1>ProFlow Plumbing & HVAC <span class="badge-after">After Hours</span></h1>
      <p>Virtual assistant — we're here when the office isn't</p>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    Bot online · Office hours: Mon–Fri 7am–6pm · Sat 8am–2pm
  </div>

  <div class="chat-window" id="chat-window"></div>

  <div class="quick-section" id="quick-section">
    <div class="quick-label">Common requests — tap to start</div>
    <div class="quick-grid" id="quick-grid"></div>
  </div>

  <div class="emergency-strip">
    <div class="emergency-bar" onclick="triggerEmergency()">
      <i class="ti ti-alert-triangle"></i>
      <div>
        <strong>Gas leak or flooding? Call us now: (555) 247-0911</strong>
        <span style="display:block;font-size:12px;opacity:0.8">24/7 emergency dispatch available</span>
      </div>
      <i class="ti ti-phone" style="margin-left:auto;font-size:20px"></i>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="chat-input" placeholder="Type your question here…" autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()" aria-label="Send"><i class="ti ti-send"></i></button>
  </div>
</div>

<script>
const COMPANY = {
  name: "ProFlow Plumbing & HVAC",
  phone: "(555) 247-0911",
  emergency: "(555) 247-0911",
  email: "service@proflowpro.com",
  hours: "Mon–Fri 7am–6pm, Sat 8am–2pm",
  callbackTime: "next business morning by 8am"
};

const QUICK_PROMPTS = [
  {icon:"ti-droplet",label:"Burst pipe / flooding",narration:"For active leaks, flooding, or broken pipes — we'll get someone to you fast.",urgent:true,key:"burst"},
  {icon:"ti-flame",label:"No heat / furnace out",narration:"Furnace down or no heat at all? Cold nights can't wait — let's troubleshoot.",urgent:true,key:"noheat"},
  {icon:"ti-wind",label:"AC not working",narration:"AC quit on you? We'll walk through some quick checks and get you on the schedule.",key:"noac"},
  {icon:"ti-calendar-plus",label:"Schedule a service",narration:"Book a plumbing, heating, or HVAC visit at a time that works for you.",key:"schedule"},
  {icon:"ti-currency-dollar",label:"Get a quote / pricing",narration:"Wondering what a repair or replacement might cost? We'll give you honest numbers.",key:"quote"},
  {icon:"ti-toilet-paper",label:"Clogged drain or toilet",narration:"Backed-up drains or an overflowing toilet — we can help clear it up.",key:"drain"},
  {icon:"ti-thermometer",label:"Water heater issues",narration:"No hot water, strange noises, or a leaking tank — let's figure out what's going on.",key:"waterheater"},
  {icon:"ti-alert-circle",label:"Gas smell / safety",narration:"If you smell gas, act immediately. Tap here for step-by-step safety instructions.",urgent:true,key:"gas"},
  {icon:"ti-clock",label:"After-hours rates",narration:"Wondering what it costs to call us outside of business hours? No surprises here.",key:"rates"},
  {icon:"ti-file-text",label:"Existing job status",narration:"Already have a job in progress? We'll help you get an update.",key:"jobstatus"},
  {icon:"ti-user-check",label:"Request a callback",narration:"Leave your info and our team will call you first thing in the morning.",key:"callback"},
  {icon:"ti-tool",label:"Maintenance plans",narration:"Prevent problems before they start — explore our annual service plans.",key:"maintenance"},
];

const RESPONSES = {
  burst:`<p>⚠️ A burst pipe is an <strong>emergency</strong> — act fast:</p><p><strong>1.</strong> Shut off your main water valve immediately.<br><strong>2.</strong> Turn off electricity near the water if safe.<br><strong>3.</strong> Call our 24/7 emergency line right now.</p><div class="confirm-card"><strong><i class="ti ti-phone"></i> Emergency dispatch: ${COMPANY.emergency}</strong>An on-call plumber will be sent to you — typically within 60–90 minutes.</div>`,
  noheat:`<p>A heating outage in cold weather is urgent. Here are a few quick checks:</p><p>• Is your thermostat set to Heat mode and above room temp?<br>• Check your breaker panel for a tripped HVAC breaker.<br>• Is your furnace filter severely clogged (restricts airflow)?</p><p>If none of those fix it, we can dispatch an after-hours technician tonight.</p><div class="chip-row"><span class="info-chip"><i class="ti ti-phone"></i> Emergency: ${COMPANY.emergency}</span><span class="info-chip"><i class="ti ti-clock"></i> After-hours fee applies</span></div>`,
  noac:`<p>Sorry your AC is down — here's what to check first:</p><p>• Verify the thermostat is on Cool and set below room temp.<br>• Check if the air filter is clogged (replace if grey/brown).<br>• Look at the breaker — HVAC breakers trip frequently in summer.<br>• Check if the outdoor unit is running (listen for the fan).</p><p>If it's still not cooling, tap below to schedule a technician visit.</p><div class="chip-row"><span class="info-chip"><i class="ti ti-calendar"></i> Same-day slots often available</span><span class="info-chip"><i class="ti ti-star"></i> Tune-ups from $89</span></div>`,
  schedule:`<p>We'd love to get you on the schedule! Our office team can confirm your appointment during business hours.</p><p><strong>Fastest options:</strong><br>• Leave your name, address & best call-back number below and we'll call you first thing.<br>• Or text/call us at <strong>${COMPANY.phone}</strong> and leave a voicemail — we return all calls by 8am.</p><div class="confirm-card"><strong>To book right now →</strong>Tell me: What's the service needed, your address, and 2 preferred time windows.</div>`,
  quote:`<p>Happy to give you ballpark pricing! Our rates vary by job type:</p><p>• <strong>Service call fee:</strong> $95 (credited toward repair)<br>• <strong>Drain clearing:</strong> $125–$275 depending on access<br>• <strong>Water heater replacement:</strong> $900–$1,800 installed<br>• <strong>HVAC tune-up:</strong> $89 single system, $149 dual<br>• <strong>Emergency after-hours:</strong> Standard rates + $125 dispatch</p><p>For exact quotes, share what you need and I'll collect details for our estimating team.</p>`,
  drain:`<p>Clogged drains are a common headache. Quick DIY attempts:</p><p>• Pour boiling water down the drain (works for grease clogs).<br>• Use a plunger with a good seal — cover overflow holes first.<br>• Try a drain snake if you have one accessible.</p><p>If it's a main line backup (multiple fixtures draining slow) that's more serious — we should get someone out.</p><div class="chip-row"><span class="info-chip"><i class="ti ti-alert-circle"></i> Multiple slow drains = main line issue</span></div>`,
  waterheater:`<p>Water heater troubles? Let's figure out what's going on:</p><p>• <strong>No hot water at all:</strong> Check pilot light (gas) or breaker (electric). Could be a failed heating element or thermocouple.<br>• <strong>Lukewarm only:</strong> Thermostat may be set too low (120°F recommended) or element wearing out.<br>• <strong>Rumbling/popping:</strong> Sediment buildup — flushing often helps.<br>• <strong>Leaking:</strong> Shut off the water supply to the heater and call us right away.</p><div class="chip-row"><span class="info-chip"><i class="ti ti-droplet-off"></i> Leaking tank = call now</span></div>`,
  gas:`<p>🚨 <strong>A gas smell is a serious emergency.</strong></p><p><strong>Do this immediately:</strong><br>1. Do NOT flip any switches or use your phone inside.<br>2. Get everyone out of the building now.<br>3. Leave the door open as you exit.<br>4. Call 911 and your gas utility from outside.<br>5. Then call us — we can respond once the utility clears the scene.</p><div class="confirm-card"><strong>Emergency line (call from outside): ${COMPANY.emergency}</strong></div>`,
  rates:`<p>Here's our rate structure — no surprises:</p><p>• <strong>Standard service call:</strong> $95 (applied to job cost)<br>• <strong>After-hours dispatch fee:</strong> $125 added to standard rates<br>• <strong>Weekend/holiday premium:</strong> 25% on labor<br>• <strong>Diagnostic/troubleshooting:</strong> $85/hr<br>• <strong>Maintenance members</strong> get waived dispatch fees + 15% off parts</p><p>All work comes with our <strong>2-year labor warranty</strong> and we use manufacturer parts.</p>`,
  jobstatus:`<p>Want an update on your service or installation?</p><p>Our office team has full access to job status, parts orders, and technician schedules. The fastest way to check:</p><p>• <strong>Call/text:</strong> ${COMPANY.phone} (leave a voicemail, we'll call back by 8am)<br>• <strong>Email:</strong> ${COMPANY.email} with your job number or address<br>• Or leave your info below and we'll proactively update you first thing.</p>`,
  callback:`<p>Absolutely — let's get a callback set up for you.</p><p>Please reply with:</p><p>1️⃣ Your <strong>full name</strong><br>2️⃣ Best <strong>phone number</strong><br>3️⃣ Your <strong>address</strong> (so we can route the right technician)<br>4️⃣ A brief <strong>description of the issue</strong></p><div class="confirm-card"><strong>You'll hear from us by ${COMPANY.callbackTime} ✓</strong>Urgent? Call ${COMPANY.emergency} for immediate dispatch.</div>`,
  maintenance:`<p>Our <strong>ProCare Maintenance Plans</strong> keep your systems running year-round:</p><p>• <strong>Basic – $129/yr:</strong> Annual furnace OR AC tune-up<br>• <strong>Comfort – $199/yr:</strong> Both heating + cooling tune-ups<br>• <strong>ProCare+ – $299/yr:</strong> Full system checks + priority scheduling + waived dispatch fees + 15% off all parts</p><p>Members get bumped to the front of the scheduling queue — no waiting during peak season.</p><div class="chip-row"><span class="info-chip"><i class="ti ti-star"></i> Most popular: Comfort Plan</span><span class="info-chip"><i class="ti ti-clock"></i> Priority dispatch included</span></div>`,
};

let conversationHistory = [];

function addMessage(text, sender, isHTML=false){
  const win=document.getElementById('chat-window');
  const div=document.createElement('div');
  div.className=`msg ${sender}`;
  const bubble=document.createElement('div');
  bubble.className='bubble';
  if(sender==='bot'){
    const av=document.createElement('div');
    av.className='avatar';av.textContent='🔧';
    div.appendChild(av);
    if(isHTML) bubble.innerHTML=text; else bubble.textContent=text;
  } else {
    bubble.textContent=text;
  }
  div.appendChild(bubble);
  win.appendChild(div);
  win.scrollTop=win.scrollHeight;
  conversationHistory.push({role:sender==='bot'?'assistant':'user',content:text.replace(/<[^>]+>/g,'')});
}

function showTyping(){
  const win=document.getElementById('chat-window');
  const div=document.createElement('div');
  div.className='msg bot';div.id='typing-indicator';
  const av=document.createElement('div');av.className='avatar';av.textContent='🔧';
  const bubble=document.createElement('div');bubble.className='bubble typing';
  bubble.innerHTML='<span></span><span></span><span></span>';
  div.appendChild(av);div.appendChild(bubble);
  win.appendChild(div);win.scrollTop=win.scrollHeight;
}

function hideTyping(){const el=document.getElementById('typing-indicator');if(el)el.remove();}

function botReply(htmlContent, delay=900){
  showTyping();
  setTimeout(()=>{hideTyping();addMessage(htmlContent,'bot',true);},delay);
}

function handleQuick(key){
  const prompt=QUICK_PROMPTS.find(q=>q.key===key);
  if(prompt){
    addMessage(prompt.label,'user');
    hideQuickSection();
    const resp=RESPONSES[key];
    if(resp) botReply(resp);
    else botReply(`<p>Got it! Can you share a bit more detail about what's happening?</p>`);
  }
}

function hideQuickSection(){document.getElementById('quick-section').style.display='none';}

async function sendMessage(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  addMessage(text,'user');
  hideQuickSection();

  const lc=text.toLowerCase();
  let matched=false;

  const keywords={
    burst:['burst','flood','water everywhere','pipe broke','broken pipe'],
    noheat:['no heat','furnace','heater not','heating not','cold house','won\'t heat'],
    noac:['no ac','ac not','air condition','not cooling','air isn\'t','too hot'],
    schedule:['schedule','appointment','book','come out','visit'],
    quote:['quote','price','cost','how much','rate','fee','estimate'],
    drain:['clog','drain','toilet','slow drain','backed up','blocked'],
    waterheater:['water heater','hot water','no hot water','water not hot','lukewarm'],
    gas:['gas','smell','leak','rotten egg'],
    rates:['after hours rate','weekend rate','overtime','emergency fee'],
    jobstatus:['job status','my job','order','when will','status of'],
    callback:['call me','callback','call back','reach me','contact me'],
    maintenance:['maintenance','tune-up','plan','service plan','annual'],
  };

  for(const [key,kws] of Object.entries(keywords)){
    if(kws.some(k=>lc.includes(k))){
      botReply(RESPONSES[key]);
      matched=true;break;
    }
  }

  if(!matched){
    showTyping();
    try{
      const sysPrompt=`You are a friendly, professional after-hours virtual assistant for ${COMPANY.name}, a plumbing, heating, and HVAC company. Business hours: ${COMPANY.hours}. Emergency line: ${COMPANY.emergency}. Email: ${COMPANY.email}. You help customers outside of office hours. Be concise, warm, and helpful. For true emergencies (gas leaks, major flooding, no heat in extreme cold), always mention the emergency line. For non-urgent issues, offer to collect callback information. Keep responses under 120 words. Use plain sentences, no markdown.`;
      const messages=conversationHistory.slice(-6).map(m=>({role:m.role,content:m.content}));
      messages.push({role:'user',content:text});
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sysPrompt,messages})
      });
      const data=await res.json();
      hideTyping();
      const reply=data.content?.find(b=>b.type==='text')?.text||"I'm having a little trouble right now. Please call us at "+COMPANY.emergency+" for immediate help.";
      addMessage(reply,'bot',false);
    }catch(e){
      hideTyping();
      addMessage(`I'm having trouble connecting right now. For immediate help, please call us at ${COMPANY.emergency} or leave a voicemail and we'll call back first thing in the morning.`,'bot',false);
    }
  }
}

document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});

function triggerEmergency(){
  addMessage('I need emergency help — possible gas leak or flooding','user');
  hideQuickSection();
  botReply(RESPONSES.gas+`<div style="margin-top:8px"><span class="info-chip"><i class="ti ti-phone"></i> Call now: ${COMPANY.emergency}</span></div>`);
}

function buildQuickGrid(){
  const grid=document.getElementById('quick-grid');
  QUICK_PROMPTS.forEach(q=>{
    const btn=document.createElement('button');
    btn.className='qbtn'+(q.urgent?' urgent':'');
    btn.innerHTML=`<i class="ti ${q.icon}" aria-hidden="true"></i><span><span style="display:block;font-weight:500">${q.label}</span><span class="narration">${q.narration}</span></span>`;
    btn.onclick=()=>handleQuick(q.key);
    grid.appendChild(btn);
  });
}

function init(){
  buildQuickGrid();
  setTimeout(()=>{
    addMessage(`<p>Hi there! 👋 I'm the after-hours assistant for <strong>ProFlow Plumbing & HVAC</strong>.</p><p>Our office is currently closed, but I can help you right now with scheduling, pricing, troubleshooting, or connecting you to our 24/7 emergency line. What can I help you with tonight?</p>`,'bot',true);
  },400);
}

init();
</script>
